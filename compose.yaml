x-airflow-common:
  &airflow-common
  build: ./docker/airflow
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}

    # MinIO
    MINIO_ENDPOINT: 'http://minio:9000'
    MINIO_ACCESS_KEY: 'minioadmin'
    MINIO_SECRET_KEY: 'minioadmin'

    # Kafka
    KAFKA_BOOTSTRAP_SERVERS: 'kafka:9092'

    # Project topics
    TOPIC_IMAGES_RAW: 'music-images-raw'
    TOPIC_TRENDS_RAW: 'music-trends-raw'

    # Bronze landing zone
    BRONZE_BUCKET: 'bronze'
    BRONZE_IMAGES_PATH: 'music_images_raw'
    BRONZE_TRENDS_PATH: 'music_trends_raw'

    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}

  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - ./data_sources:/opt/airflow/data_sources

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7.2-bookworm
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'CONTROLLER://:29093,PLAINTEXT://:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_HEAP_OPTS: '-Xmx384m -Xms256m'
      KAFKA_LOG_RETENTION_HOURS: '24'
      KAFKA_LOG_RETENTION_BYTES: '268435456'
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      JAVA_OPTS: '-Xmx192m -Xms128m'
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./config/kafkaui_config.yml:/etc/kafkaui/dynamic_config.yaml
    restart: unless-stopped

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          export AIRFLOW_UID=$$(id -u)
        fi
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config /opt/airflow/scripts /opt/airflow/data_sources
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  image-producer:
    build: ./docker/airflow
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: 'kafka:9092'
      TOPIC_IMAGES_RAW: 'music-images-raw'
      IMAGES_SOURCE_PATH: '/opt/airflow/data_sources/images'
      MAX_IMAGES: '10'
      SLEEP_SECONDS: '3'
      SHUFFLE_IMAGES: 'true'
      RESIZE_MAX_DIM: '512'
      JPEG_QUALITY: '75'
    volumes:
      - ./scripts:/opt/airflow/scripts
      - ./data_sources:/opt/airflow/data_sources
    command: python /opt/airflow/scripts/produce_images.py
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
  
  trends-api:   
    build: ./docker/airflow
    env_file:
      - .env
    environment:
      TRENDS_SEED_PATH: '/opt/airflow/data_sources/trends_seed/trends_seed_enriched.parquet'
      STREAM_DELAY_SECONDS: '2'
      MAX_TRACKS_IN_MEMORY: '5000'
    volumes:
      - ./scripts:/opt/airflow/scripts
      - ./data_sources:/opt/airflow/data_sources
    command: uvicorn trends_api:app --host 0.0.0.0 --port 8000 --app-dir /opt/airflow/scripts
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  trends-producer:
    build: ./docker/airflow
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: 'kafka:9092'
      TOPIC_TRENDS_RAW: 'music-trends-raw'
      TRENDS_API_BASE_URL: 'http://trends-api:8000'
      TRENDS_API_STREAM_ENDPOINT: '/stream'
      MAX_POSTS: '10'
      RUN_FOREVER: 'false'
      REQUEST_TIMEOUT: '60'
      RETRY_SLEEP_SECONDS: '3'
    volumes:
      - ./scripts:/opt/airflow/scripts
      - ./data_sources:/opt/airflow/data_sources
    command: python /opt/airflow/scripts/produce_trends.py
    depends_on:
      kafka:
        condition: service_healthy
      trends-api:
        condition: service_started
    restart: "no"

  jupyter-playground:
    build: ./docker/jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-playground}
      MINIO_ENDPOINT: 'http://minio:9000'
      MINIO_ACCESS_KEY: 'minioadmin'
      MINIO_SECRET_KEY: 'minioadmin'
      KAFKA_BOOTSTRAP_SERVERS: 'kafka:9092'
      TOPIC_IMAGES_RAW: 'music-images-raw'
      TOPIC_TRENDS_RAW: 'music-trends-raw'
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./scripts:/home/jovyan/scripts
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres-db-volume:
  minio_data:
  airflow-logs: